services:
  # --- INFRASTRUCTURE ---
  postgres:
    image: postgres:16
    container_name: postgres-db
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: user_db,order_db,payment_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount the file as a plain text file
      - ./init-db/init.sh:/docker-entrypoint-initdb.d/init.sh

  redis:
    image: redis:alpine
    container_name: redis-cache
    ports: ["6379:6379"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # --- OBSERVABILITY ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports: ["3000:3000"]
    depends_on: [loki, tempo]

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports: ["3100:3100"]

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes: ["./tempo-config.yaml:/etc/tempo.yaml"]
    ports: ["3200:3200", "9411:9411"]

  # --- MICROSERVICES ---
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
      args:
        SERVICE_PATH: user-service
    container_name: user-service
    ports: ["8081:8081"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/user_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis-cache
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on: [postgres, kafka, redis]

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
      args:
        SERVICE_PATH: analytics-service
    container_name: analytics-service
    ports: ["8082:8082"]
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis-cache
    depends_on: [kafka, redis]

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
      args:
        SERVICE_PATH: gateway-service
    container_name: gateway-service
    ports: ["8080:8080"]
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis-cache
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on: [kafka, redis]

volumes:
  postgres_data: