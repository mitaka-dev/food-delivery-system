server:
  port: 8080

eureka:
  client:
    enabled: false

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:redis-cache}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        # Auth endpoints — public, routed to user-service
        - id: auth-route
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/auth/**

        # User registration — public
        - id: user-registration-route
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/users
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@remoteAddrKeyResolver}"

        # Protected: Order flow (requires JWT — enforced by JwtAuthenticationFilter)
        - id: order-service-route
          uri: http://order-service:8083
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@remoteAddrKeyResolver}"

        # Protected: Product catalog (requires JWT; ADMIN enforcement done in product-service)
        - id: product-service-route
          uri: http://product-service:8085
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@remoteAddrKeyResolver}"

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

#Observability
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://tempo:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
