server:
  port: 8081

spring:
  application:
    name: user-service

  # Database Configuration
  datasource:
    url: jdbc:postgresql://postgres-db:5432/user_db
    username: ${POSTGRES_USER:user}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration/user-service

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: false   # event_publication table created by V3__outbox.sql
      republish-outstanding-events-on-restart: true

  # Kafka Configuration
  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Using JSON serializer to send DTOs from common-libs
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: user-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "food.delivery.system.*"

  data:
    redis:
      host: ${REDIS_HOST:redis-cache}
      port: ${REDIS_PORT:6379}

jwt:
  access-token-expiration: 900000        # 15 minutes in ms
  refresh-token-expiration: 2592000000   # 30 days in ms

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://tempo:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus