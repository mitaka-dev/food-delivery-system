spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    admin:
      auto-create: false
  modulith:
    events:
      jdbc:
        # Let Spring Modulith create the v2 event_publication schema in H2
        # (Flyway is disabled in unit tests, so there's no Flyway-managed table)
        schema-initialization:
          enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

jwt:
  access-token-expiration: 900000
  refresh-token-expiration: 2592000000
