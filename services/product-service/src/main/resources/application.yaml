server:
  port: 8085

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://postgres-db:5432/product_db
    username: ${POSTGRES_USER:user}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration/product-service

  data:
    redis:
      host: ${REDIS_HOST:redis-cache}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: product-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "food.delivery.system.*"

app:
  s3:
    bucket: ${S3_BUCKET:product-images-local}
    region: ${AWS_REGION:us-east-1}
  cloudfront:
    base-url: ${CLOUDFRONT_BASE_URL:}

grpc:
  server:
    port: 9090

resilience4j:
  ratelimiter:
    instances:
      grpc-verify:
        limitForPeriod: 1000
        limitRefreshPeriod: 1s
        timeoutDuration: 0ms

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://tempo:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
